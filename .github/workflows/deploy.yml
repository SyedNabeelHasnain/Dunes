name: Deploy Laravel Application to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Parse FTP Server Host
      id: ftp_server
      run: |
        SERVER_HOST="${{ vars.FTP_SERVER }}"
        SERVER_HOST="${SERVER_HOST#ftp://}"
        SERVER_HOST="${SERVER_HOST#ftps://}"
        echo "host=$SERVER_HOST" >> $GITHUB_OUTPUT

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install NPM dependencies & Build Assets
      run: |
        npm ci
        npm run build

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, mysql, openssl
        cache-control: no-cache
        coverage: none

    - name: Install Composer dependencies
      run: |
        composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

    - name: Create Deploy Directories
      run: |
        mkdir -p deploy/public_deploy
        mkdir -p deploy/core_deploy

    - name: Prepare Public Assets Staging
      run: |
        # Copy public files to staging
        cp -r public/* deploy/public_deploy/
        
        # Adjust paths in index.php to point to dunes-laravel directory
        sed -i "s|__DIR__.'/../storage/framework/maintenance.php'|__DIR__.'/../dunes-laravel/storage/framework/maintenance.php'|g" deploy/public_deploy/index.php
        sed -i "s|__DIR__.'/../vendor/autoload.php'|__DIR__.'/../dunes-laravel/vendor/autoload.php'|g" deploy/public_deploy/index.php
        sed -i "s|__DIR__.'/../bootstrap/app.php'|__DIR__.'/../dunes-laravel/bootstrap/app.php'|g" deploy/public_deploy/index.php

        # Package public assets into a zip, excluding unzip.php
        cd deploy/public_deploy
        zip -r ../public.zip . -x unzip.php
        cd ../..

        # Clean staging and place only public.zip and unzip.php
        rm -rf deploy/public_deploy/*
        mv deploy/public.zip deploy/public_deploy/public.zip
        cp public/unzip.php deploy/public_deploy/unzip.php

    - name: Prepare Core Code Staging
      run: |
        # Generate the .env file in the runner from .env.example
        cp .env.example .env
        php artisan key:generate

        # Populate database credentials dynamically from secrets/vars with hardcoded fallbacks
        sed -i "s|DB_HOST=127.0.0.1|DB_HOST=${{ vars.DB_HOST || secrets.DB_HOST || 'localhost' }}|g" .env
        sed -i "s|DB_DATABASE=u410503041_ddtlaravel|DB_DATABASE=${{ vars.DB_NAME || secrets.DB_NAME || 'u410503041_ddtlaravel' }}|g" .env
        sed -i "s|DB_USERNAME=u410503041_ddtlaravel|DB_USERNAME=${{ vars.DB_USER || secrets.DB_USER || 'u410503041_ddtlaravel' }}|g" .env
        sed -i "s|DB_PASSWORD=|DB_PASSWORD=${{ secrets.DB_PASSWORD || vars.DB_PASSWORD || 'P@kistanZindaBad123\!@#' }}|g" .env

        # Copy core Laravel directories and files, excluding public assets, node_modules, and git history
        rsync -arv --exclude="public" --exclude="node_modules" --exclude=".git" --exclude=".github" --exclude="deploy" ./ deploy/core_deploy/

        # Package core files into a zip
        cd deploy/core_deploy
        zip -r ../core.zip .
        cd ../..

        # Clean staging and place only core.zip
        rm -rf deploy/core_deploy/*
        mv deploy/core.zip deploy/core_deploy/core.zip

    - name: FTP Deploy Public Assets to public_html
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ steps.ftp_server.outputs.host }}
        username: ${{ secrets.FTP_USERNAME || vars.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}
        local-dir: ./deploy/public_deploy/
        server-dir: public_html/
        dangerous-clean-slate: true
        protocol: ftps
        timeout: 360000

    - name: FTP Deploy Core Laravel Code to dunes-laravel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ steps.ftp_server.outputs.host }}
        username: ${{ secrets.FTP_USERNAME || vars.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}
        local-dir: ./deploy/core_deploy/
        server-dir: dunes-laravel/
        dangerous-clean-slate: true
        protocol: ftps
        timeout: 360000

    - name: Trigger Remote Zip Extraction
      run: |
        curl -sS "https://dunesdiscoverytourism.com/unzip.php?key=dunes2026"
